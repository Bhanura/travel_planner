name: Frontend CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: huggingface-frontend-staging
  cancel-in-progress: true

jobs:
  deploy-frontend:
    name: Deploy Gradio frontend
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out tested source
        uses: actions/checkout@v6
        with:
          ref: >-
            ${{ github.event.workflow_run.head_sha || 'main' }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Hugging Face deployment CLI
        run: >-
          python -m pip install
          --disable-pip-version-check
          huggingface-hub==1.24.0

      - name: Build curated Space bundle
        run: |
          mkdir -p .space-deploy
          cp frontend.py .space-deploy/app.py
          cp deployment/huggingface/README.md .space-deploy/README.md
          cp deployment/huggingface/requirements.txt .space-deploy/requirements.txt
          python -m py_compile .space-deploy/app.py

      - name: Upload frontend to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          DEPLOY_SHA: >-
            ${{ github.event.workflow_run.head_sha || github.sha }}
        run: >-
          hf upload
          Bhanura/tripweaver-travel-planner
          .space-deploy
          .
          --repo-type=space
          --delete="*"
          --commit-message="Deploy GitHub ${DEPLOY_SHA}"