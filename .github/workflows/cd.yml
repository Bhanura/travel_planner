name: Frontend CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: huggingface-frontend-staging
  cancel-in-progress: true

jobs:
  deploy-frontend:
    name: Deploy Gradio frontend
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out tested source
        uses: actions/checkout@v6
        with:
          ref: >-
            ${{ github.event.workflow_run.head_sha || 'main' }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build curated Space bundle
        run: |
          mkdir -p .space-deploy
          cp frontend.py .space-deploy/app.py
          cp deployment/huggingface/README.md .space-deploy/README.md
          cp deployment/huggingface/requirements.txt .space-deploy/requirements.txt
          python -m py_compile .space-deploy/app.py

      - name: Deploy frontend through Space Git repository
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          DEPLOY_SHA: >-
            ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          git clone --depth 1 \
            https://huggingface.co/spaces/Bhanura/tripweaver-travel-planner \
            .space-repo

          cp .space-deploy/app.py .space-repo/app.py
          cp .space-deploy/README.md .space-repo/README.md
          cp .space-deploy/requirements.txt .space-repo/requirements.txt

          cd .space-repo

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No frontend changes require deployment."
            exit 0
          fi

          git commit -m "Deploy GitHub ${DEPLOY_SHA}"

          git remote set-url origin \
            "https://Bhanura:${HF_TOKEN}@huggingface.co/spaces/Bhanura/tripweaver-travel-planner"

          git push origin HEAD:main
